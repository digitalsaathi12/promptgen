# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = app/database/migrations

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, aligned with app root
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone =

# limit the conversion of the sqlalchemy_url in the connection string
# sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
