version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: digitalsaathi_prod_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: digitalsaathi
    ports:
      - "5433:5432"
    volumes:
      - pgdata_prod:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: digitalsaathi_prod_redis
    restart: always
    ports:
      - "6380:6379"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - SOURCE_TYPE=local
        - NEXT_PUBLIC_API_URL=/api/v1
    container_name: digitalsaathi_prod_web
    restart: always
    environment:
      - CONTAINER_ROLE=web
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/digitalsaathi
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CELERY_TASK_ALWAYS_EAGER=False
    ports:
      - "80:80"
    depends_on:
      - db
      - redis

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - SOURCE_TYPE=local
    container_name: digitalsaathi_prod_worker
    restart: always
    environment:
      - CONTAINER_ROLE=worker
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/digitalsaathi
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CELERY_TASK_ALWAYS_EAGER=False
    depends_on:
      - db
      - redis

volumes:
  pgdata_prod:
